<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GV13 Studios</title>
    <style>
        :root { --primary: #ff6b6b; --secondary: #4ecdc4; --dark: #2d3436; --light: #f8f9fa; --gray: #95a5a6; --danger: #e74c3c; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 90px; color: var(--dark); }
        
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: white; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { text-align: center; width: 85%; max-width: 350px; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 5px solid var(--primary); }
        
        #loading-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #1a1a1a; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9998; color: white; }
        .loader-bar { width: 0%; height: 4px; background: var(--primary); transition: width 3s linear; }

        #main-content { display: none; }
        .app-header { background: white; padding: 10px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .app-header h1 { margin: 0; font-size: 14px; letter-spacing: 2px; }
        
        .section { display: none; padding: 15px; max-width: 600px; margin: auto; }
        .section.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #eee; }

        .grid-meses { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 15px 0; }
        .mes-btn { padding: 8px 2px; font-size: 10px; border-radius: 5px; border: 1px solid #ddd; background: #fff; cursor: pointer; text-align: center; }
        .mes-btn.pago { background: var(--success); color: white; border-color: var(--success); font-weight: bold; }

        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; box-sizing: border-box; }
        .dia-item { display: flex; align-items: center; gap: 10px; background: #f8f9fa; padding: 8px; border-radius: 8px; margin-bottom: 5px; }
        .dia-item select { flex: 1; padding: 5px; border-radius: 5px; border: 1px solid #ddd; }
        .dia-label { width: 70px; font-weight: bold; font-size: 12px; }

        .btn { background: var(--dark); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { border: none; background: none; color: var(--gray); font-size: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: flex-end; }
        .modal-content { background: white; padding: 25px; border-radius: 25px 25px 0 0; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-sizing: border-box; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1>GV13 <span style="color:var(--primary)">STUDIOS</span></h1>
        <input type="password" id="pass-input" placeholder="Senha" style="text-align:center;">
        <button class="btn" style="background:var(--primary)" onclick="checkLogin()">ENTRAR</button>
    </div>
</div>

<div id="loading-screen">
    <div style="width:70%; background:#333; height:4px; border-radius:10px;"><div class="loader-bar" id="bar"></div></div>
    <div style="font-size:10px; margin-top:15px; color:var(--secondary);">GV13 STUDIOS - SINCRONIZANDO...</div>
</div>

<div id="main-content">
    <div class="app-header"><h1>APRENDENDO COM AMOR</h1></div>

    <section id="aba-inicio" class="section active">
        <div class="card" style="background: var(--dark); color: white;">
            <h2 id="hoje-data" style="margin: 0; font-size: 16px;"></h2>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="card"><small>RECEBIDO (MÊS)</small><p id="dash-recebido" style="color:var(--success); font-weight:bold; margin:5px 0;">R$ 0,00</p></div>
            <div class="card"><small>A RECEBER</small><p id="dash-pendente" style="color:var(--danger); font-weight:bold; margin:5px 0;">R$ 0,00</p></div>
        </div>
    </section>

    <section id="aba-alunos" class="section">
        <input type="text" id="inputBusca" class="search-box" placeholder="🔍 Buscar aluno..." onkeyup="renderAlunos()">
        <div id="lista-alunos"></div>
        <button class="btn" style="position:fixed; bottom:100px; right:20px; width:60px; height:60px; border-radius:50%; background:var(--primary); font-size:25px;" onclick="abrirModalCadastro()">+</button>
    </section>

    <section id="aba-agenda" class="section">
        <div style="display:flex; gap:5px; overflow-x:auto; padding-bottom:10px; margin-bottom:10px;">
            <button class="btn" style="width:auto; padding:8px 15px; font-size:11px;" onclick="filtrarAgenda('Segunda')">SEG</button>
            <button class="btn" style="width:auto; padding:8px 15px; font-size:11px;" onclick="filtrarAgenda('Terça')">TER</button>
            <button class="btn" style="width:auto; padding:8px 15px; font-size:11px;" onclick="filtrarAgenda('Quarta')">QUA</button>
            <button class="btn" style="width:auto; padding:8px 15px; font-size:11px;" onclick="filtrarAgenda('Quinta')">QUI</button>
            <button class="btn" style="width:auto; padding:8px 15px; font-size:11px;" onclick="filtrarAgenda('Sexta')">SEX</button>
            <button class="btn" style="width:auto; padding:8px 15px; font-size:11px; background:var(--secondary);" onclick="filtrarAgenda('Sábado')">SÁB</button>
        </div>
        <div id="lista-agenda"></div>
    </section>

    <section id="aba-sistema" class="section">
        <div class="card">
            <h3>Backup</h3>
            <button class="btn" style="background:var(--success)" onclick="exportarDados()">EXPORTAR</button>
            <input type="file" id="importFile" style="display:none;" onchange="importarDados(event)">
            <button class="btn" style="background:var(--gray); margin-top:10px;" onclick="document.getElementById('importFile').click()">IMPORTAR</button>
        </div>
    </section>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('aba-inicio', this)">📊<br>INÍCIO</button>
        <button class="nav-item" onclick="switchTab('aba-alunos', this)">👥<br>ALUNOS</button>
        <button class="nav-item" onclick="switchTab('aba-agenda', this)">📅<br>AGENDA</button>
        <button class="nav-item" onclick="switchTab('aba-sistema', this)">⚙️<br>SISTEMA</button>
    </nav>
</div>

<div id="modalCadastro" class="modal">
    <div class="modal-content">
        <h2>Matrícula</h2>
        <input type="hidden" id="edit-id">
        <input type="text" id="inNome" placeholder="Criança">
        <input type="text" id="inPai" placeholder="Responsável">
        <input type="text" id="inZap" placeholder="WhatsApp">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="number" id="inVenc" placeholder="Dia Venc.">
            <input type="number" id="inValor" placeholder="Valor R$">
        </div>
        <div id="grade-inputs"></div>
        <button class="btn" style="background:var(--primary); margin-top:15px;" onclick="salvarAluno()">GRAVAR</button>
        <button class="btn" style="background:#eee; color:#333" onclick="fecharModais()">FECHAR</button>
    </div>
</div>

<div id="modalFicha" class="modal"><div class="modal-content" id="fichaCorpo"></div></div>

<script>
    const mesesPagamento = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
    const diasSemana = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
    const DB_NAME = 'gv13_v_final';
    let alunos = JSON.parse(localStorage.getItem(DB_NAME)) || [];

    const gradeDiv = document.getElementById('grade-inputs');
    diasSemana.forEach(dia => {
        gradeDiv.innerHTML += `
            <div class="dia-item">
                <span class="dia-label">${dia}</span>
                <select id="h-${dia}">
                    <option value="">Livre</option>
                    <option value="13:00">13h às 14h</option>
                    <option value="14:00">14h às 15h</option>
                    <option value="15:00">15h às 16h</option>
                    <option value="16:00">16h às 17h</option>
                </select>
            </div>`;
    });

    function checkLogin() {
        if(document.getElementById('pass-input').value === "reforco") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';
            document.getElementById('bar').style.width = '100%';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                renderTudo();
            }, 2000);
        } else { alert("Senha incorreta"); }
    }

    function renderInicio() {
        const dataAtual = new Date();
        document.getElementById('hoje-data').innerText = dataAtual.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        
        const mesAtualNome = mesesPagamento[dataAtual.getMonth()];
        let recebidoMes = 0;
        let pendenteMes = 0;

        alunos.forEach(al => {
            const valor = parseFloat(al.valor) || 0;
            const pagos = al.pagos || [];
            if (pagos.includes(mesAtualNome)) {
                recebidoMes += valor;
            } else {
                pendenteMes += valor;
            }
        });

        document.getElementById('dash-recebido').innerText = `R$ ${recebidoMes.toFixed(2)}`;
        document.getElementById('dash-pendente').innerText = `R$ ${pendenteMes.toFixed(2)}`;
    }

    function salvarAluno() {
        const id = document.getElementById('edit-id').value;
        const grade = {};
        diasSemana.forEach(d => grade[d] = document.getElementById('h-' + d).value);

        const alunoExistente = id ? alunos.find(a => a.id == id) : null;

        const dados = {
            id: id ? parseInt(id) : Date.now(),
            nome: document.getElementById('inNome').value,
            pai: document.getElementById('inPai').value,
            zap: document.getElementById('inZap').value,
            venc: document.getElementById('inVenc').value,
            valor: parseFloat(document.getElementById('inValor').value) || 0,
            grade: grade,
            pagos: alunoExistente ? (alunoExistente.pagos || []) : []
        };

        if(id) {
            const idx = alunos.findIndex(a => a.id == id);
            alunos[idx] = dados;
        } else {
            alunos.push(dados);
        }
        localStorage.setItem(DB_NAME, JSON.stringify(alunos));
        fecharModais();
        renderTudo();
    }

    function toggleMes(alunoId, mes) {
        const al = alunos.find(a => a.id == alunoId);
        al.pagos = al.pagos || [];
        if(al.pagos.includes(mes)) {
            al.pagos = al.pagos.filter(m => m !== mes);
        } else {
            al.pagos.push(mes);
        }
        localStorage.setItem(DB_NAME, JSON.stringify(alunos));
        verFicha(alunoId);
        renderInicio(); 
    }

    function renderAlunos() {
        const busca = document.getElementById('inputBusca').value.toLowerCase();
        const container = document.getElementById('lista-alunos');
        container.innerHTML = "";
        alunos.filter(a => a.nome.toLowerCase().includes(busca)).forEach(al => {
            container.innerHTML += `<div class="card" onclick="verFicha(${al.id})"><strong>${al.nome}</strong><br><small>Vencimento: dia ${al.venc}</small></div>`;
        });
    }

    function verFicha(id) {
        const al = alunos.find(a => a.id == id);
        al.pagos = al.pagos || [];
        document.getElementById('fichaCorpo').innerHTML = `
            <h2>${al.nome}</h2>
            <p>Valor: R$ ${al.valor.toFixed(2)} | Venc: ${al.venc}</p>
            <div class="grid-meses">
                ${mesesPagamento.map(m => `<div class="mes-btn ${al.pagos.includes(m) ? 'pago' : ''}" onclick="toggleMes(${al.id}, '${m}')">${m}</div>`).join('')}
            </div>
            <button class="btn" onclick="editarMatricula(${al.id})">EDITAR</button>
            <button class="btn" style="background:var(--danger)" onclick="deletarMatricula(${al.id})">EXCLUIR</button>
            <button class="btn" style="background:#eee; color:#333" onclick="fecharModais()">VOLTAR</button>
        `;
        document.getElementById('modalFicha').style.display = 'flex';
    }

    function filtrarAgenda(dia) {
        const lista = document.getElementById('lista-agenda');
        lista.innerHTML = `<h3>${dia}</h3>`;
        ["13:00", "14:00", "15:00", "16:00"].forEach(h => {
            // CORRIGIDO AQUI: Adicionado a verificação (a.grade &&) para não quebrar a agenda
            const al = alunos.find(a => a.grade && a.grade[dia] === h);
            lista.innerHTML += `<div class="card"><b>${h}</b> - ${al ? al.nome : 'Livre'}</div>`;
        });
    }

    function renderTudo() { renderAlunos(); renderInicio(); filtrarAgenda('Segunda'); }
    function switchTab(tabId, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
        renderTudo();
    }
    function fecharModais() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function exportarDados() {
        const blob = new Blob([JSON.stringify(alunos)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "backup.json"; a.click();
    }
    function importarDados(e) {
        const reader = new FileReader();
        reader.onload = ev => {
            alunos = JSON.parse(ev.target.result);
            localStorage.setItem(DB_NAME, JSON.stringify(alunos));
            renderTudo(); alert("Ok!");
        };
        reader.readAsText(e.target.files[0]);
    }
    function editarMatricula(id) {
        const al = alunos.find(a => a.id == id);
        fecharModais();
        document.getElementById('modalCadastro').style.display = 'flex';
        document.getElementById('edit-id').value = al.id;
        document.getElementById('inNome').value = al.nome;
        document.getElementById('inPai').value = al.pai;
        document.getElementById('inZap').value = al.zap;
        document.getElementById('inVenc').value = al.venc;
        document.getElementById('inValor').value = al.valor;
        diasSemana.forEach(d => document.getElementById('h-' + d).value = al.grade ? al.grade[d] : "");
    }
    function abrirModalCadastro() {
        fecharModais();
        document.getElementById('edit-id').value = "";
        document.getElementById('inNome').value = "";
        diasSemana.forEach(d => document.getElementById('h-' + d).value = "");
        document.getElementById('modalCadastro').style.display = 'flex';
    }
    function deletarMatricula(id) { if(confirm("Apagar?")) { alunos = alunos.filter(a => a.id !== id); localStorage.setItem(DB_NAME, JSON.stringify(alunos)); fecharModais(); renderTudo(); } }
</script>
</body>
</html>
